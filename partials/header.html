<!-- partials/header.html -->
<header class="site-header" role="banner">
  <div class="container header-inner">
    <a class="brand" href="index.html" aria-label="Ir a inicio">
      <img src="assets/img/logo-eo4mrv.svg" alt="EO4MRV" class="brand-logo" />
    </a>

    <nav class="nav" aria-label="Navegación principal">
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="navMenu">
        <span class="sr-only">Abrir menú</span>
        ☰
      </button>

      <ul id="navMenu" class="nav-menu">
        <li><a href="proyecto.html">Proyecto</a></li>
        <li><a href="objetivos.html">Objetivos</a></li>
        <li><a href="recursos.html">Recursos</a></li>
        <li><a href="tutoriales.html">Tutoriales</a></li>
        <li><a href="storymaps.html">Story Maps</a></li>
        <li><a href="socios.html">Socios</a></li>
        <li><a href="noticias.html">Noticias</a></li>
        <li><a href="contacto.html" class="btn btn-sm">Contacto</a></li>
      </ul>
    </nav>
  </div>
  <script>
  const menuBtn = document.getElementById('menuBtn');
  const navMenu = document.getElementById('navMenu');

  menuBtn.addEventListener('click', () => {
    navMenu.classList.toggle('is-active');
    const expanded = menuBtn.getAttribute('aria-expanded') === 'true';
    menuBtn.setAttribute('aria-expanded', !expanded);
    menuBtn.innerHTML = expanded ? '☰' : '✕';
  });

  document.addEventListener('click', (e) => {
    if (!menuBtn.contains(e.target) && !navMenu.contains(e.target)) {
      navMenu.classList.remove('is-active');
      menuBtn.setAttribute('aria-expanded', 'false');
      menuBtn.innerHTML = '☰';
    }
  });
</script>

</header>
