<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recursos — EO4MRV</title>
  <meta name="description" content="Repositorio de recursos, manuales y plantillas EO4MRV." />
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script defer src="assets/js/include.js"></script>
  <script defer src="assets/js/main.js"></script>
</head>
<body>
  <div id="headerMount"></div>

  <main>
    <section class="pagehead">
      <div class="container">
        <div class="breadcrumb">Inicio / Recursos</div>
        <h1>Recursos</h1>
        <p class="muted">Manual base, plantillas MRV y materiales descargables.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div id="resourcesList" class="list"></div>
      </div>
    </section>
  </main>

  <div id="footerMount"></div>

  <script type="module">
    import { resources } from "./assets/js/data.js";
    const mount = document.getElementById("resourcesList");
    mount.innerHTML = resources.map(r => `
      <article class="card item">
        <div class="left">
          <div class="badge">${r.type}</div>
          <h3 style="margin:10px 0 6px">${r.title}</h3>
          <p class="muted" style="margin:0">${r.desc}</p>
        </div>
        <div class="right">
          <a class="btn btn-sm" href="${r.file}" aria-label="Descargar ${r.title}">Descargar</a>
        </div>
      </article>
    `).join("");
  </script>
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>

</body>
</html>
